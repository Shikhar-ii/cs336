<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Practice</title>
  </head>
  <body>
    <h1>JavaScript Practice</h1>

    <!-- Display -->
    <p id="demo">Hello World!</p>

    <!-- Positive/Negative/Zero Checker -->
    <input type="number" id="numInput" placeholder="Enter a number">
    <button onclick="checkNumber()">Check Number</button>

    <br><br>

    <!-- Arithmetic Operations -->
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button onclick="calculate('add')">Add</button>
    <button onclick="calculate('multiply')">Multiply</button>
    <button onclick="calculate('subtract')">Subtract</button>
    <button onclick="calculate('divide')">Divide</button>

    <p id="result"></p>

    <br><br>

    <!-- Sum from 1 to n -->
    <input type="number" id="sumInput" placeholder="Enter number n">
    <button onclick="sumToN()">Calculate Sum</button>
    <p id="sumResult"></p>

    <br><br>

    <!-- Print Even Numbers -->
    <button onclick="printEvenNumbers()">Print Even Numbers 1 to 20</button>
    <p id="evenResult"></p>

    <br><br>

    <!-- Name Input -->
    <button onclick="inputName()">Enter Name</button>

    <br><br>

    <!-- Hello Button -->
    <button onclick="sayHello()">Click me</button>

    <!-- Link JS file -->
    <script src="script.js"></script>
  </body>
</html>
